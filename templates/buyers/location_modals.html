<div id="locationModal" style="display:none; position:fixed; top:0; left:0; width:100vw; min-height:100vh; height:100vh; background:rgba(0,0,0,0.5); z-index:99999; align-items:center; justify-content:center; overflow:hidden;">
    <div style="max-width:460px; width:90%; border-radius:16px; background:#fff; border:0.5px solid #d4edca; overflow:hidden; max-height:90vh; overflow-y:auto; margin:auto; box-shadow:0 20px 60px rgba(76,175,80,0.18);">
        <!-- Light green header -->
        <div style="background:#EAF3DE; border-bottom:1px solid #C0DD97; padding:18px 22px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:36px; height:36px; background:#C0DD97; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                    <!-- Location pin SVG icon -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#27500A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg>
                </div>
                <div>
                    <p style="color:#27500A; font-size:16px; font-weight:600; margin:0;">Find meals near you</p>
                    <p style="color:#6b6b67; font-size:12px; margin:0; margin-top:2px;">Set your location to find nearby meals</p>
                </div>
            </div>
        </div>
        <!-- Modal body -->
        <div style="padding:28px 22px 18px 22px;">
            <!-- Subtitle -->
            <p style="color:#6b6b67; font-size:13px; font-weight:400; margin-bottom:16px;">To discover nearby cooks and order, please set your location.</p>
            <!-- Search area or street -->
            <label style="display:block; font-size:15px; font-weight:600; margin-bottom:8px; color:#388E3C;">Search area or street</label>
            <div style="display:flex; gap:10px; margin-bottom:14px;">
                <input id="location-search-input" type="text" placeholder="Type area, street, or pincode" style="flex:1; border:1.5px solid #C0DD97; background:#f9fdf5; border-radius:10px; padding:10px 14px; font-size:13px; outline:none;">
                <button id="location-search-btn" type="button" class="btn btn-success btn-sm" style="background:#EAF3DE; color:#27500A; border:1.5px solid #3B6D11; border-radius:10px; padding:10px 16px; font-weight:600; font-size:13px; cursor:pointer; white-space:nowrap;">Search</button>
            </div>
            <div id="location-search-results" style="margin-top:10px;"></div>
            <!-- Use current location button -->
            <div style="margin-bottom:14px;">
                <button id="location-use-current-btn" type="button" style="width:100%; background:#f0f9ea; border:1.5px solid #97C459; border-radius:10px; padding:12px 16px; display:flex; align-items:center; gap:10px; cursor:pointer; box-sizing:border-box;">
                    <span style="display:flex; align-items:center; justify-content:center; background:#C0DD97; width:32px; height:32px; border-radius:50%;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#27500A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    </span>
                    <div style="flex:1; text-align:left;">
                        <span style="color:#27500A; font-weight:600; font-size:13px;">Use current location</span><br>
                        <span style="color:#3B6D11; font-size:11px; margin-top:2px;">Tap to detect your GPS location</span>
                    </div>
                    <span style="margin-left:auto;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </span>
                </button>
                <div id="location-current-result" style="margin-top:10px; font-size:14px; color:#388E3C;"></div>
            </div>
            <!-- OR divider -->
            <div style="display:flex; align-items:center; gap:8px; margin:18px 0 10px 0;">
                <div style="flex:1; height:1px; background:#C0DD97;"></div>
                <span style="color:#639922; font-size:12px; font-weight:500; white-space:nowrap;">or enter pincode</span>
                <div style="flex:1; height:1px; background:#C0DD97;"></div>
            </div>
            <!-- Enter pincode manually -->
            <div style="display:flex; gap:10px; margin-bottom:18px;">
                <input id="location-pincode-input" type="text" maxlength="10" placeholder="Enter pincode" style="flex:1; border:1.5px solid #C0DD97; background:#f9fdf5; border-radius:10px; padding:10px 14px; font-size:13px; outline:none;">
                <button id="location-pincode-btn" type="button" class="btn btn-success btn-sm" style="background:#EAF3DE; color:#27500A; border:1.5px solid #3B6D11; border-radius:10px; padding:10px 18px; font-weight:600; font-size:13px; cursor:pointer;">Set</button>
            </div>
            <!-- Recent locations card -->
            <div style="background:#f4fbef; border:0.5px solid #C0DD97; border-radius:10px; padding:14px 16px; margin-bottom:18px;">
                <div style="color:#639922; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600; margin-bottom:10px;">RECENT LOCATIONS</div>
                <div id="recent-locations-list" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
            <!-- Saved addresses card -->
            <div style="background:#f4fbef; border:0.5px solid #C0DD97; border-radius:10px; padding:14px 16px; margin-bottom:18px;">
                <div style="color:#639922; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600; margin-bottom:10px;">SAVED ADDRESSES</div>
                <div id="saved-addresses-list" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
            <!-- Skip for now link -->
            <a id="location-skip-btn" href="#" style="color:#9e9d99; font-size:12px; font-weight:500; text-align:center; display:block; margin-top:14px; cursor:pointer; text-decoration:none;">Skip for now — I will set location later</a>
            <small id="location-modal-message" style="display:block; margin-top:8px; color:#C62828; text-align:center;"></small>
        </div>
    </div>
</div>
